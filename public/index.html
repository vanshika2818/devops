<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Toolscape</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">
        <i class="fas fa-tools"></i> DevOps Toolscape
      </a>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="control-panel bg-light p-4 rounded mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <input type="text" id="searchBar" class="form-control" placeholder="Search by Tool Name">
        </div>
        <div class="col-md-4">
          <select id="categoryFilter" class="form-select">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="col-md-4">
          <select id="pricingFilter" class="form-select">
            <option value="">All Pricing Types</option>
          </select>
        </div>
      </div>
    </div>

    <div id="toolsContainer" class="row">
      <!-- Tools will be rendered here -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
